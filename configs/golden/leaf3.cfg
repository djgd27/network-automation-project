    !!! ACL rules allowing incoming tcp/57411 for the eda-discovery grpc server
    network-instance default {
        type default
        router-id 10.0.0.13
        interface ethernet-1/1.0 {
        }
        interface ethernet-1/2.0 {
        }
        interface system0.0 {
        }
        protocols {
            bgp {
                admin-state enable
                autonomous-system 65103
                router-id 10.0.0.13
                afi-safi ipv4-unicast {
                    admin-state enable
                }
                group spine {
                    export-policy [
                        export-loopback
                    ]
                    import-policy [
                        accept-all
                    ]
                }
                neighbor 10.1.1.4 {
                    admin-state enable
                    description spine1
                    peer-as 65001
                    peer-group spine
                }
                neighbor 10.1.2.4 {
                    admin-state enable
                    description spine2
                    peer-as 65002
                    peer-group spine
                }
            }
        }
    }
    network-instance mgmt {
        type ip-vrf
        admin-state enable
        description "Management network instance"
        interface mgmt0.0 {
        }
        protocols {
            linux {
                import-routes true
                export-routes true
                export-neighbors true
            }
        }
    }
    interface ethernet-1/1 {
        description "p2p to spine1 Eth3"
        admin-state enable
        subinterface 0 {
            admin-state enable
            ipv4 {
                admin-state enable
                address 10.1.1.5/31 {
                }
            }
        }
    }
    interface ethernet-1/2 {
        description "p2p to spine2 Eth3"
        admin-state enable
        subinterface 0 {
            admin-state enable
            ipv4 {
                admin-state enable
                address 10.1.2.5/31 {
                }
            }
        }
    }
    interface ethernet-1/3 {
        admin-state enable
    }
    interface mgmt0 {
        admin-state enable
        subinterface 0 {
            admin-state enable
            ipv4 {
                admin-state enable
                dhcp-client {
                }
            }
            ipv6 {
                admin-state enable
                dhcp-client {
                }
            }
        }
    }
    interface system0 {
        admin-state enable
        subinterface 0 {
            admin-state enable
            ipv4 {
                admin-state enable
                address 10.0.0.13/32 {
                }
            }
        }
    }
