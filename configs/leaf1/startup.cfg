!
service routing protocols model multi-agent
!
hostname leaf1
!
interface Ethernet1
   description p2p to spine1 Eth1
   no switchport
   ip address 10.1.1.1/31
!
interface Ethernet2
   description p2p to spine2 Eth1
   no switchport
   ip address 10.1.2.1/31
!
interface Ethernet3
!
interface Loopback0
   description Router-ID and BGP source, VTEP IP
   ip address 10.0.0.11/32
!
ip routing
!
ip route 0.0.0.0/0 172.20.20.1
!
router bgp 65101
   router-id 10.0.0.11
   no bgp default ipv4-unicast
   neighbor 10.1.1.0 remote-as 65001
   neighbor 10.1.1.0 description spine1
   neighbor 10.1.1.0 send-community extended
   neighbor 10.1.2.0 remote-as 65002
   neighbor 10.1.2.0 description spine2
   neighbor 10.1.2.0 send-community extended
   !
   address-family evpn
      neighbor 10.1.1.0 activate
      neighbor 10.1.2.0 activate
   !
   address-family ipv4
      neighbor 10.1.1.0 activate
      neighbor 10.1.2.0 activate
      network 10.0.0.11/32
!
end