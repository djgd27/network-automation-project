network-instance default
  router-id 10.0.0.13
  interface ethernet-1/1.0
  interface ethernet-1/2.0
  interface system0.0
  protocols bgp
    autonomous-system 65103
    router-id 10.0.0.13
    afi-safi evpn
    afi-safi ipv4-unicast
    group spine
      export-policy [export-loopback]
      import-policy [accept-all]
      afi-safi evpn
    neighbor 10.1.1.4  (peer-as 65001, spine1, peer-group spine)
    neighbor 10.1.2.4  (peer-as 65002, spine2, peer-group spine)

interface ethernet-1/1
  description "p2p to spine1 Eth3"
  subinterface 0 ipv4 address 10.1.1.5/31

interface ethernet-1/2
  description "p2p to spine2 Eth3"
  subinterface 0 ipv4 address 10.1.2.5/31

interface ethernet-1/3
  admin-state enable

interface system0
  subinterface 0 ipv4 address 10.0.0.13/32

routing-policy
  prefix-set loopback { 10.0.0.13/32 }
  policy accept-all      { statement 10 accept }
  policy export-loopback { statement 10 match prefix-set loopback, accept }