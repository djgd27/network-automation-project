service routing protocols model multi-agent
!
hostname leaf3
!
vlan 101
   name TENANT_A_VLAN101
!
vrf instance TENANT_A
!
interface Ethernet1
   description p2p to spine1 Eth3
   no switchport
   ip address 10.1.1.5/31
!
interface Ethernet2
   description p2p to spine2 Eth3
   no switchport
   ip address 10.1.2.5/31
!
interface Ethernet3
   description Server3 access port - VLAN 101
   switchport access vlan 101
!
interface Loopback0
   description Router-ID and BGP source, VTEP IP
   ip address 10.0.0.13/32
!
interface Vlan101
   description TENANT_A VLAN 101 anycast gateway
   vrf TENANT_A
   ip address virtual 10.101.0.1/24
!
interface Vxlan1
   description VTEP for TENANT_A
   vxlan source-interface Loopback0
   vxlan udp-port 4789
   vxlan vlan 101 vni 10101
   vxlan vrf TENANT_A vni 10999
!
ip virtual-router mac-address 02:1c:73:00:00:65
!
ip routing
ip routing vrf TENANT_A
!
router bgp 65103
   router-id 10.0.0.13
   no bgp default ipv4-unicast
   neighbor 10.1.1.4 remote-as 65001
   neighbor 10.1.1.4 description spine1
   neighbor 10.1.1.4 send-community extended
   neighbor 10.1.2.4 remote-as 65002
   neighbor 10.1.2.4 description spine2
   neighbor 10.1.2.4 send-community extended
   !
   vlan 101
      rd 10.0.0.13:10101
      route-target both 10101:10101
      redistribute learned
   !
   address-family evpn
      neighbor 10.1.1.4 activate
      neighbor 10.1.2.4 activate
   !
   address-family ipv4
      neighbor 10.1.1.4 activate
      neighbor 10.1.2.4 activate
      network 10.0.0.13/32
   !
   vrf TENANT_A
      rd 10.0.0.13:10999
      route-target import evpn 10999:10999
      route-target export evpn 10999:10999
      router-id 10.0.0.13
      redistribute connected
!
end
