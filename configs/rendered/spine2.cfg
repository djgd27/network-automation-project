!
service routing protocols model multi-agent
!
hostname spine2
!
interface Ethernet1
   description p2p to leaf1 Eth2
   no switchport
   ip address 10.1.2.0/31
!
interface Ethernet2
   description p2p to leaf2 Eth2
   no switchport
   ip address 10.1.2.2/31
!
interface Ethernet3
   description p2p to leaf3 Eth2
   no switchport
   ip address 10.1.2.4/31
!
interface Loopback0
   description Router-ID and BGP source
   ip address 10.0.0.2/32
!
ip routing
!
router bgp 65002
   router-id 10.0.0.2
   no bgp default ipv4-unicast
   neighbor 10.1.2.1 remote-as 65101
   neighbor 10.1.2.1 description leaf1
   neighbor 10.1.2.1 send-community extended
   neighbor 10.1.2.3 remote-as 65102
   neighbor 10.1.2.3 description leaf2
   neighbor 10.1.2.3 send-community extended
   neighbor 10.1.2.5 remote-as 65103
   neighbor 10.1.2.5 description leaf3
   neighbor 10.1.2.5 send-community extended
   !
   address-family evpn
      neighbor 10.1.2.1 activate
      neighbor 10.1.2.1 next-hop-unchanged
      neighbor 10.1.2.3 activate
      neighbor 10.1.2.3 next-hop-unchanged
      neighbor 10.1.2.5 activate
      neighbor 10.1.2.5 next-hop-unchanged
   !
   address-family ipv4
      neighbor 10.1.2.1 activate
      neighbor 10.1.2.3 activate
      neighbor 10.1.2.5 activate
      network 10.0.0.2/32
!
end
