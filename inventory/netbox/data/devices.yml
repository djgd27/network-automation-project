# Six managed network devices. Servers (server1..3) are not modeled in NetBox —
# their lifecycle lives in topology/lab.clab.yml exec blocks.
# `primary_ip4` is set after IPs are loaded; seed.py sets it to the Loopback0 IP
# in a second pass. Listed here for documentation.

- name: spine1
  site: lab
  role: spine
  device_type: ceos-lab
  status: active
  custom_fields:
    bgp_asn: 65001
  primary_ip4: 10.0.0.1/32

- name: spine2
  site: lab
  role: spine
