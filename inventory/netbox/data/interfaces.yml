- device: leaf2
  name: Ethernet2
  type: 1000base-t
  description: To spine2 Ethernet2

- device: leaf2
  name: Ethernet3
  type: 1000base-t
  description: Access port to server2 (untagged VLAN 100)
  mode: access
  untagged_vlan: 100

- device: leaf2
  name: Vlan100
