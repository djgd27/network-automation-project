# ============================================================
# edge1 (FRR, AS 65200)
# ============================================================
- device: edge1
  name: lo
  type: virtual
  description: Router-ID and BGP source

- device: edge1
  name: eth0
  type: virtual
  description: containerlab mgmt (172.20.20.0/24, runtime-assigned)
  mgmt_only: true

- device: edge1
  name: eth1
  type: 1000base-t
  description: To spine1 Ethernet4
