# Network Automation Project - Lab Topology
# 2 spines + 3 leaves + 1 edge + 3 servers
# EVPN-VXLAN spine-leaf fabric, multi-vendor (cEOS + FRR)

name: network-automation-project
prefix: ""

mgmt:
  network: clab
  ipv4-subnet: 172.20.20.0/24

topology:
  kinds:
    arista_ceos:
      image: ceos:4.36.0F
    linux:
      image: alpine:latest

  nodes:
    # ============================================================
    # Spines — Arista cEOS
    # ============================================================
    spine1:
      kind: arista_ceos
      group: spine
    spine2:
      kind: arista_ceos
      group: spine

    # ============================================================
    # Leaves — 3x cEOS
    # ============================================================
    leaf1:
      kind: arista_ceos
      group: leaf
    leaf2:
      kind: arista_ceos
      group: leaf
    leaf3:
      kind: arista_ceos
      group: leaf

    # ============================================================
    # Edge — FRR, simulates upstream / "internet"
    # ============================================================
    edge1:
      kind: linux
      image: frrouting/frr:latest
      group: edge
      binds:
        - ../configs/edge1/daemons:/etc/frr/daemons
        - ../configs/edge1/frr.conf:/etc/frr/frr.conf

    # ============================================================
    # Servers — Alpine, one per leaf
    # exec{} auto-configures the host-side NIC at boot
    # ============================================================
    server1:
      kind: linux
      group: server
      exec:
        - ip addr add 10.100.0.101/24 dev eth1
        - ip link set eth1 up
        - ip route del default
        - ip route add default via 10.100.0.1 dev eth1
    server2:
      kind: linux
      group: server
      exec:
        - ip addr add 10.100.0.102/24 dev eth1
        - ip link set eth1 up
        - ip route del default
        - ip route add default via 10.100.0.1 dev eth1
    server3:
      kind: linux
      group: server
      exec:
        - ip addr add 10.101.0.103/24 dev eth1
        - ip link set eth1 up
        - ip route del default
        - ip route add default via 10.101.0.1 dev eth1

  links:
    # Spine1 fan-out
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["spine1:eth3", "leaf3:eth1"]
    - endpoints: ["spine1:eth4", "edge1:eth1"]

    # Spine2 fan-out
    - endpoints: ["spine2:eth1", "leaf1:eth2"]
    - endpoints: ["spine2:eth2", "leaf2:eth2"]
    - endpoints: ["spine2:eth3", "leaf3:eth2"]

    # Access ports (leaf ↔ server)
    - endpoints: ["leaf1:eth3", "server1:eth1"]
    - endpoints: ["leaf2:eth3", "server2:eth1"]
    - endpoints: ["leaf3:eth3", "server3:eth1"]
